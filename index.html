<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07000F">
<title>🪩 Last Disco – Dołącz!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FFD700;--gold2:#FFA500;--pink:#FF2D9C;--pink2:#FF6BC8;
  --blue:#00CFFF;--green:#39FF14;--green2:#ADFF2F;--red:#FF3333;
  --dark:#07000F;--card:rgba(255,255,255,.07);--border:rgba(255,215,0,.2);
  --text:#FFF8E7;--muted:rgba(255,248,231,.5);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  min-height:100%;min-height:100dvh;
  background:var(--dark);color:var(--text);
  font-family:'Outfit',sans-serif;
  overflow-x:hidden;
}
/* Safe area for iPhone notch */
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}

/* ── BG ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(255,45,156,.18) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(0,207,255,.12) 0%,transparent 50%);}
.dots{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;
  background-image:radial-gradient(circle,rgba(255,215,0,.15) 1px,transparent 1px);
  background-size:24px 24px;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  padding:16px;padding-bottom:calc(80px + env(safe-area-inset-bottom));}
.screen.active{display:flex;}

/* ── JOIN SCREEN ── */
#join{align-items:center;justify-content:center;text-align:center;gap:0;}
.join-disco{font-size:3.5rem;margin-bottom:6px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)rotate(-5deg);}50%{transform:translateY(-8px)rotate(5deg);}}
.join-title{font-family:'Bebas Neue';font-size:clamp(2.5rem,12vw,5rem);letter-spacing:6px;line-height:.9;
  background:linear-gradient(135deg,var(--gold),var(--gold2) 40%,var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(255,215,0,.2));}
.join-sub{font-family:'Outfit';font-style:italic;color:var(--blue);font-size:1rem;letter-spacing:2px;margin:8px 0 28px;}
.name-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:360px;}
.name-label{font-family:'Bebas Neue';font-size:.75rem;letter-spacing:4px;color:var(--gold);margin-bottom:8px;}
.name-input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,215,0,.3);border-radius:10px;
  color:var(--text);font-family:'Outfit';font-size:16px;font-weight:600;padding:14px 16px;
  outline:none;text-align:center;transition:border-color .2s;}
.name-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,215,0,.15);}
.join-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--dark);border:none;border-radius:12px;padding:16px;
  font-family:'Bebas Neue';font-size:1.4rem;letter-spacing:3px;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 20px rgba(255,215,0,.3);}
.join-btn:active{transform:scale(.97);}
.join-hint{font-size:.7rem;color:var(--muted);margin-top:10px;text-align:center;line-height:1.5;}

/* ── WAITING SCREEN ── */
#waiting{align-items:center;justify-content:center;text-align:center;gap:16px;}
.wait-emoji{font-size:3rem;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.wait-title{font-family:'Bebas Neue';font-size:1.8rem;letter-spacing:4px;color:var(--gold);}
.wait-sub{font-size:.9rem;color:var(--muted);line-height:1.6;}
.wait-name{font-family:'Bebas Neue';font-size:1.2rem;color:var(--pink);letter-spacing:2px;}
.wait-online{font-size:.8rem;color:var(--green);letter-spacing:2px;font-family:'Bebas Neue';}

/* ── GAME SCREEN ── */
#game{gap:12px;padding-top:max(16px, env(safe-area-inset-top));}
.game-top{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;margin-bottom:4px;}
.game-tag{font-family:'Bebas Neue';font-size:.75rem;letter-spacing:3px;
  background:linear-gradient(90deg,var(--gold),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.player-tag{font-family:'Bebas Neue';font-size:.7rem;letter-spacing:2px;color:var(--muted);}
.voted-badge{font-family:'Bebas Neue';font-size:.75rem;letter-spacing:2px;color:var(--green);
  background:rgba(57,255,20,.1);border:1px solid rgba(57,255,20,.3);border-radius:20px;padding:4px 12px;}

/* ── QUESTION CARD ── */
.q-card{background:linear-gradient(135deg,rgba(255,215,0,.07),rgba(255,45,156,.05));
  border:1px solid rgba(255,215,0,.25);border-radius:16px;
  padding:22px 20px;text-align:center;flex-shrink:0;}
.q-round{font-family:'Bebas Neue';font-size:.72rem;letter-spacing:3px;color:var(--pink);margin-bottom:6px;}
.q-text{font-family:'Outfit';font-weight:800;font-size:clamp(1.2rem,5vw,1.8rem);line-height:1.25;color:var(--text);}
.q-hint{font-size:.85rem;color:var(--muted);margin-top:8px;font-style:italic;line-height:1.4;}

/* ── OPTIONS ── */
.options{display:flex;flex-direction:column;gap:10px;}
.opt{background:rgba(255,255,255,.06);border:2px solid rgba(255,215,0,.2);border-radius:12px;
  padding:16px 18px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.opt:active{transform:scale(.98);}
.opt.selected{border-color:var(--gold);background:rgba(255,215,0,.12);}
.opt.correct{border-color:var(--green);background:rgba(57,255,20,.1);}
.opt.wrong{border-color:var(--red);background:rgba(255,51,51,.07);}
.opt.sent{border-color:var(--green2);background:rgba(173,255,47,.06);cursor:default;}
.opt-letter{font-family:'Bebas Neue';font-size:1.5rem;color:var(--blue);min-width:24px;text-align:center;flex-shrink:0;}
.opt-letter.correct{color:var(--green);}
.opt-text{font-size:.95rem;font-weight:600;line-height:1.35;}

/* ── VOTE BUTTONS (big) ── */
.vote-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.vote-btn{border-radius:14px;padding:24px 12px;text-align:center;cursor:pointer;
  border:2px solid transparent;transition:all .25s;-webkit-tap-highlight-color:transparent;
  min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.vote-btn:active{transform:scale(.96);}
.vote-btn.hot{background:rgba(255,45,156,.12);border-color:rgba(255,45,156,.4);color:var(--pink);}
.vote-btn.not{background:rgba(0,207,255,.08);border-color:rgba(0,207,255,.3);color:var(--blue);}
.vote-btn.yes{background:rgba(57,255,20,.1);border-color:rgba(57,255,20,.4);color:var(--green);}
.vote-btn.no{background:rgba(0,207,255,.08);border-color:rgba(0,207,255,.3);color:var(--blue);}
.vote-btn.a{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.4);color:var(--gold);}
.vote-btn.b{background:rgba(255,45,156,.1);border-color:rgba(255,45,156,.35);color:var(--pink);}
.vote-btn.selected{transform:scale(.97);}
.vote-btn.hot.selected,.vote-btn.yes.selected{background:rgba(255,45,156,.3);border-color:var(--pink);box-shadow:0 0 20px rgba(255,45,156,.25);}
.vote-btn.not.selected,.vote-btn.no.selected{background:rgba(0,207,255,.2);border-color:var(--blue);box-shadow:0 0 20px rgba(0,207,255,.2);}
.vote-btn.a.selected{background:rgba(255,215,0,.25);border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,.2);}
.vote-btn.b.selected{background:rgba(255,45,156,.25);border-color:var(--pink);box-shadow:0 0 20px rgba(255,45,156,.2);}
.vote-icon{font-size:2.2rem;display:block;margin-bottom:6px;}
.vote-label{font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:2px;display:block;}

/* ── ANSWER REVEAL ── */
.answer-card{border-radius:14px;padding:20px 18px;text-align:center;
  animation:revealPop .4s cubic-bezier(.34,1.56,.64,1);}
.answer-card.correct{background:linear-gradient(135deg,rgba(57,255,20,.1),rgba(0,207,255,.06));border:2px solid rgba(57,255,20,.35);}
.answer-card.neutral{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(0,207,255,.06));border:2px solid rgba(255,215,0,.3);}
@keyframes revealPop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.answer-lbl{font-family:'Bebas Neue';font-size:.72rem;letter-spacing:4px;color:var(--green);margin-bottom:6px;}
.answer-lbl.neutral{color:var(--gold);}
.answer-val{font-family:'Outfit';font-weight:800;font-size:clamp(1.3rem,5vw,2rem);color:var(--text);line-height:1.15;}
.answer-note{font-size:.8rem;color:var(--muted);margin-top:6px;line-height:1.4;}

/* ── ADVICE INPUT ── */
.advice-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.advice-label{font-family:'Bebas Neue';font-size:.72rem;letter-spacing:4px;color:var(--gold);margin-bottom:8px;}
.advice-ta{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,215,0,.25);border-radius:10px;
  color:var(--text);font-family:'Outfit';font-size:16px;padding:12px 14px;outline:none;
  resize:none;min-height:80px;line-height:1.6;caret-color:var(--gold);}
.advice-ta:focus{border-color:var(--gold);}
.advice-ta::placeholder{color:var(--muted);}
.advice-send{width:100%;margin-top:10px;background:linear-gradient(135deg,var(--pink),#8B0055);
  border:none;border-radius:10px;color:white;padding:14px;
  font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.advice-send:active{transform:scale(.97);}
.advice-sent-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.advice-sent-item{background:var(--card);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;
  padding:10px 12px;font-style:italic;font-size:.9rem;color:var(--text);line-height:1.5;}

/* ── IDLE / WAITING FOR GAME ── */
.idle-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:28px 20px;text-align:center;margin-top:24px;}
.idle-emoji{font-size:2.5rem;margin-bottom:10px;animation:pulse 2s ease-in-out infinite;}
.idle-text{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:3px;color:var(--gold);}
.idle-sub{font-size:.82rem;color:var(--muted);margin-top:6px;line-height:1.5;}

/* ── BINGO PLAYER ── */
.player-bingo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:6px;}
.pb-cell{aspect-ratio:1;border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;font-size:.5rem;font-weight:600;color:var(--text);line-height:1.2;background:var(--card);cursor:pointer;transition:all .2s;}
.pb-cell.marked{background:linear-gradient(135deg,var(--pink),#7B0044);border-color:var(--gold);color:white;}
.pb-cell.free{background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,45,156,.12));border-color:var(--gold);font-family:'Bebas Neue';font-size:.75rem;color:var(--gold);}

/* ── TIER LIST PLAYER ── */

/* ── FB STATUS ── */
.fb-dot{position:fixed;top:max(8px,env(safe-area-inset-top));right:10px;
  font-family:'Bebas Neue';font-size:.6rem;letter-spacing:1px;color:var(--muted);z-index:9999;}
.fb-dot.ok{color:var(--green);}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(100px);
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);
  font-family:'Bebas Neue';font-size:1rem;letter-spacing:2px;
  padding:10px 24px;border-radius:50px;z-index:9999;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
  box-shadow:0 4px 20px rgba(255,215,0,.3);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── CONFETTI ── */
.confetti-overlay{position:fixed;inset:0;z-index:500;pointer-events:none;overflow:hidden;}
.confetti-piece{position:absolute;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-10px)rotate(0);opacity:1;}100%{transform:translateY(110vh)rotate(540deg);opacity:0;}}

/* ── SCORE BAR ── */
.score-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(7,0,15,.92);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,215,0,.15);
  padding:8px 16px 10px;padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:12px;transition:all .4s;}
.score-bar-pts{font-family:'Bebas Neue';font-size:1.6rem;letter-spacing:2px;color:#FFD700;
  min-width:50px;line-height:1;transition:all .3s;}
.score-bar-pts small{font-size:.65rem;opacity:.6;letter-spacing:1px;font-family:'Outfit';}
.score-bar-right{flex:1;display:flex;flex-direction:column;gap:3px;}
.score-bar-label{font-family:'Bebas Neue';font-size:.62rem;letter-spacing:3px;color:rgba(255,248,231,.4);}
.score-bar-track{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.score-bar-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FFA500);border-radius:2px;
  transition:width .6s cubic-bezier(.34,1.1,.64,1);}
.score-feedback{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom));right:16px;z-index:300;
  font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:2px;
  padding:8px 18px;border-radius:50px;
  animation:feedbackPop .4s cubic-bezier(.34,1.56,.64,1) forwards, feedbackFade 2s 1s forwards;
  pointer-events:none;}
.score-feedback.plus{background:linear-gradient(135deg,rgba(57,255,20,.2),rgba(0,207,255,.1));
  border:1px solid rgba(57,255,20,.4);color:#39FF14;}
.score-feedback.minus{background:rgba(255,51,51,.12);border:1px solid rgba(255,51,51,.3);color:#FF3333;}
@keyframes feedbackPop{from{opacity:0;transform:translateY(20px) scale(.8);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes feedbackFade{from{opacity:1;}to{opacity:0;transform:translateY(-8px);}}

/* ── SCREEN TRANSITIONS ── */
.screen{transition:opacity .25s ease;}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  *,.screen,.confetti-piece,.join-disco,.wait-emoji,.idle-emoji,.score-bar-fill,.answer-card,.score-feedback{
    animation:none!important;transition:none!important;
  }
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="dots"></div>
<div class="confetti-overlay" id="confettiOverlay"></div>
<div class="fb-dot" id="fbDot">⬤</div>

<!-- JOIN -->
<div class="screen active" id="join">
  <div class="join-disco">🪩</div>
  <div class="join-title">LAST DISCO</div>
  <div class="join-sub">Wieczór Panieński Kasi</div>
  <div class="name-card">
    <div class="name-label">TWOJE IMIĘ</div>
    <input class="name-input" id="nameInput" type="text" placeholder="Np. Ania" autocomplete="off" autocapitalize="words" maxlength="20">
    <button class="join-btn" onclick="joinGame()">🪩 DOŁĄCZ!</button>
    <div class="join-hint">Wpisz swoje imię i dołącz do zabawy.<br>Prowadząca widzi wszystkie głosy na TV.</div>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="waiting">
  <div class="wait-emoji">🪩</div>
  <div class="wait-title">CZEKAJ NA GRĘ</div>
  <div class="wait-name" id="waitName"></div>
  <div class="wait-online" id="waitOnline">⬤ 0 graczy online</div>
  <div class="wait-sub">Prowadząca zaraz wybierze grę.<br>Telefon zostaw odblokowany!</div>
  <button onclick="changeName()" style="margin-top:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.2);color:var(--muted);border-radius:8px;padding:8px 16px;font-family:'Bebas Neue';font-size:.7rem;letter-spacing:2px;cursor:pointer;">ZMIEŃ IMIĘ</button>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="game-top">
    <div class="game-tag" id="gameTag">🪩 LAST DISCO</div>
    <div class="player-tag" id="playerTag"></div>
  </div>
  <div id="gameContent" style="padding-bottom:8px;"></div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, onDisconnect }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6rMzHu8Its4w4EP2D4P5gewp5KfSO5oE",
  authDomain: "lastdisco.firebaseapp.com",
  databaseURL: "https://lastdisco-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lastdisco",
  storageBucket: "lastdisco.firebasestorage.app",
  messagingSenderId: "686521685198",
  appId: "1:686521685198:web:31642810de2c2ca2086c9f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Connection status
onValue(ref(db,'.info/connected'), snap => {
  const el = document.getElementById('fbDot');
  el.textContent = snap.val() ? '⬤ OK' : '⬤ OFF';
  el.className = snap.val() ? 'fb-dot ok' : 'fb-dot';
});

// Online count
onValue(ref(db,'presence'), snap => {
  const raw = snap.val() || {};
  const uniqueNames = new Set(Object.values(raw).map(v => v && v.name).filter(Boolean));
  document.getElementById('waitOnline').textContent = `⬤ ${uniqueNames.size} graczy online`;
});

// Expose
window.DB = { db, ref, set, get, push, onValue, onDisconnect };

window.addEventListener('fbReady_player', async () => {
  const name = window._playerName;
  if(!name) return;
  // Remove old presence if changing name
  if(window._presRef) { try { await set(window._presRef, null); } catch(e){} }
  // Presence
  const presRef = ref(db, 'presence/'+name+'_'+Date.now());
  window._presRef = presRef;
  await set(presRef, {name, ts: Date.now()});
  onDisconnect(presRef).remove();
});

// Listen to game state
onValue(ref(db,'gameState'), snap => {
  const state = snap.val();
  if(!window._playerName) return; // not joined yet
  window._handleGameState(state);
});

// Advice sync
onValue(ref(db,'advice'), snap => {
  window._adviceList = snap.val() ? Object.values(snap.val()) : [];
  if(window._currentPlayerGame === 'advice') renderAdvicePlayer();
});

// ── Listen to scores for this player ──
function listenMyScore(name) {
  if(!name) return;
  const pKey = name.replace(/\s/g,'_');
  onValue(ref(db,'scores/'+pKey), snap => {
    const data = snap.val();
    window._myScore = data;
    window._renderScoreBar?.();
  });
}
window.listenMyScore = listenMyScore;

window.dispatchEvent(new Event('fbReady_player'));
</script>

<script>
let _playerName = '';
let _playerVoted = false;
let _playerBingo = new Array(25).fill(false);
let _currentPlayerGame = '';
let _lastGameKey = '';
window._adviceList = [];

// ══════════════════════════════════════════
// JOIN
// ══════════════════════════════════════════
async function joinGame() {
  const n = document.getElementById('nameInput').value.trim();
  if(!n) { showToast('Wpisz swoje imię!'); return; }

  // Check for duplicate names in presence
  try {
    const snap = await window.DB.get(window.DB.ref(window.DB.db, 'presence'));
    const raw = snap.val() || {};
    const taken = new Set(Object.values(raw).map(v => v && v.name).filter(Boolean));
    if(taken.has(n)) {
      showToast('Imię "'+n+'" jest już zajęte!');
      return;
    }
  } catch(e) { /* offline — allow join */ }

  _playerName = n;
  window._playerName = n;
  window.listenMyScore?.(n);
  document.getElementById('playerTag').textContent = n.toUpperCase();
  document.getElementById('waitName').textContent = '👋 Hej, ' + n + '!';
  switchScreen('waiting');
  window.dispatchEvent(new Event('fbReady_player'));
  showToast('Dołączyłaś! 🪩');
}

function changeName() {
  // Clear old presence via Firebase event
  _playerName = '';
  window._playerName = '';
  window.dispatchEvent(new Event('fbReady_player'));
  switchScreen('join');
  document.getElementById('nameInput').value = '';

// SCREEN NAV

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bar = document.getElementById('scoreBar');
  if(bar) bar.style.display = (id === 'game') ? 'flex' : 'none';
  window._renderScoreBar?.();

// ══════════════════════════════════════════
// GAME STATE HANDLER
// ══════════════════════════════════════════
window._handleGameState = function(state) {
  clearInterval(_playerTimerInterval);
  if(!state || state.game === 'idle') {
    switchScreen('waiting');
    _currentPlayerGame = '';
    document.getElementById('waitOnline').textContent = document.getElementById('waitOnline').textContent.replace(/ · .*$/,'');
    return;
  }
  // Update waiting screen with active game name (visible before switch)
  const wo = document.getElementById('waitOnline');
  if(wo) wo.textContent = wo.textContent.replace(/ · .*$/,'') + ' · Gra: ' + (state.game||'').toUpperCase();
  switchScreen('game');
  _currentPlayerGame = state.game;
  document.getElementById('gameTag').textContent = gameEmoji(state.game) + ' ' + state.game.toUpperCase();

  // Reset vote flag when new question
  const key = state.game + '_' + (state.idx ?? '') + '_' + (state.phase ?? '') + '_' + (state.ts ?? '');
  if(key !== _lastGameKey) {
    _playerVoted = false;
    _lastGameKey = key;
  }

  const content = document.getElementById('gameContent');
  content.innerHTML = '';

  switch(state.game) {
    case 'quiz':      renderQuizPlayer(state); break;
    case 'quizblazej':renderQuizBlazejPlayer(state); break;
    case 'honornot':  renderHonPlayer(state); break;
    case 'highlow':   renderHLPlayer(state); break;
    case 'choice':    renderChoicePlayer(state); break;
    case 'neverhave': renderNeverPlayer(state); break;
    case 'advice':    renderAdvicePlayer(state); break;
    case 'bingo':     window._lastBingoState = state; renderBingoPlayer(state); break;
    case 'couples':   renderCouplesPlayer(state); break;
    case 'vabank':    renderVabankPlayer(state); break;
    case 'eight':     renderEightPlayer(state); break;
    case 'draw':      renderDrawPlayer(state); break;
    case 'timeline':  window._lastGameState=state; renderTimelinePlayer(state); break;
    case 'dilemmas':  renderDilemmasPlayer(state); break;
    default:          renderIdleCard('Gra: ' + state.game); break;
  }
};

function gameEmoji(g) {
  return {quiz:'🎤',quizblazej:'💒',honornot:'🔥',highlow:'📊',choice:'⚡',neverhave:'🙈',advice:'💌',
    bingo:'🎰',couples:'💑',vabank:'🎲',eight:'⏱️',
    timeline:'📅',dilemmas:'🤔'}[g]||'🪩';
}

let _timelineOrder = null;
function renderTimelinePlayer(state) {
  const c = document.getElementById('gameContent');
  if(state.phase==='arranging') {
    const events = state.events || [];
    if(!_timelineOrder) _timelineOrder = events.map((_,i)=>i);
    c.innerHTML=`

          <span class="opt-letter" style="font-size:1rem;">${_timelineOrder.indexOf(i)+1}</span>
          <span class="opt-text">${esc(events[i]?.event||'')}</span>
        </div>`).join('')}
      </div>
      ${_playerVoted?`<div class="answer-card neutral"><div class="answer-lbl neutral">✅ KOLEJNOSC WYSLANA!</div></div>`
      :`<button class="join-btn" style="margin-top:10px;" onclick="submitTimeline()">✅ ZATWIERDZ KOLEJNOSC</button>`}`;
  } else {
    const correct = state.correctOrder || [];
    c.innerHTML=`
      <div class="q-card"><div class="q-round">📅 POPRAWNA KOLEJNOSC</div></div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${correct.map((idx,pos)=>`<div class="opt correct" style="cursor:default;">
          <span class="opt-letter correct" style="font-size:1rem;">${pos+1}</span>
          <span class="opt-text">${esc(state.events?.[idx]?.event||'Wydarzenie '+(pos+1))}</span>
        </div>`).join('')}
      </div>`;
    spawnConfetti(15);
  }
}
function timelineMoveUp(idx){
  if(_playerVoted) return;
  const pos = _timelineOrder.indexOf(idx);
  if(pos>0){_timelineOrder.splice(pos,1);_timelineOrder.splice(pos-1,0,idx);}
  else{_timelineOrder.push(_timelineOrder.shift());}// wrap
  const state=window._lastGameState;if(state) renderTimelinePlayer(state);
}
function submitTimeline(){
  if(_playerVoted) return;
  _playerVoted=true;
  // Map player order back to original indices
  const events = window._lastGameState?.events||[];
  const order = _timelineOrder.map(i=>events[i]?.idx??i);
  window.DB?.set(window.DB.ref(window.DB.db,'timeline/'+_playerName.replace(/\s/g,'_')), order);
  showToast('Kolejnosc wyslana!');spawnConfetti(15);
  const state=window._lastGameState;if(state) renderTimelinePlayer(state);
}

// ══════════════════════════════════════════
// DILEMMAS PLAYER
// ══════════════════════════════════════════
function renderDilemmasPlayer(state) {
  const c = document.getElementById('gameContent');
  if(state.phase==='voting') {
    c.innerHTML=`
      <div class="q-card"><div class="q-round">🤔 DYLEMAT</div><div class="q-text">${esc(state.q||'')}</div></div>
      ${_playerVoted?`<div class="answer-card neutral"><div class="answer-lbl neutral">✅ GLOS WYSLANY!</div><div style="font-size:.8rem;color:var(--muted);margin-top:4px;">Czekam az Kasia ujawni...</div></div>`:`
      <div class="vote-grid">
        ${(state.opts||[]).map((o,i)=>`<div class="vote-btn ${i===0?'hot':'not'}" onclick="sendVote('${esc(o)}');renderSimpleVoted()"><span class="vote-icon">${i===0?'💃':'🤵'}</span><span class="vote-label">${esc(o)}</span></div>`).join('')}
      </div>`}`;
  } else {
    c.innerHTML=`
      <div class="q-card"><div class="q-round">🤔 DYLEMAT</div><div class="q-text">${esc(state.q||'')}</div></div>
      <div class="answer-card correct"><div class="answer-lbl">ODPOWIEDZ</div><div class="answer-val">${esc(state.answer||'')}</div>${state.answerNote?`<div class="answer-note">${esc(state.answerNote)}</div>`:''}</div>`;
    spawnConfetti(15);
  }
}

// ══════════════════════════════════════════
// IDLE
// ══════════════════════════════════════════
function renderIdleCard(txt) {
  document.getElementById('gameContent').innerHTML=`<div class="idle-card"><div class="idle-emoji">🪩</div><div class="idle-text">${esc(txt)}</div><div class="idle-sub">Patrz na TV i kibicuj!</div></div>`;
}

// ══════════════════════════════════════════
// GENERIC VOTED UI
// ══════════════════════════════════════════
function renderSimpleVoted() {
  document.querySelector('.vote-grid')?.remove();
  document.getElementById('gameContent').insertAdjacentHTML('beforeend','<div class="answer-card neutral"><div class="answer-lbl neutral">✅ GŁOS WYSŁANY!</div></div>');
}

// ══════════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════════
let _confettiTimer = null;
function spawnConfetti(n=30) {
  const ov=document.getElementById('confettiOverlay');ov.innerHTML='';
  clearTimeout(_confettiTimer);
  const cols=['#FFD700','#FF2D9C','#00CFFF','#ADFF2F','#FF6BC8'];
  for(let i=0;i<n;i++){const d=document.createElement('div');d.className='confetti-piece';d.style.left=Math.random()*100+'%';d.style.background=cols[~~(Math.random()*cols.length)];d.style.width=(6+Math.random()*8)+'px';d.style.height=(6+Math.random()*8)+'px';d.style.borderRadius=Math.random()>.5?'50%':'2px';d.style.animationDuration=(1.2+Math.random()*1.5)+'s';d.style.animationDelay=(Math.random()*.5)+'s';ov.appendChild(d);}
  _confettiTimer=setTimeout(()=>ov.innerHTML='',3000);
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);}

// ── SCORE BAR RENDERER ──
let _prevTotal = 0;
window._myScore = null;

window._renderScoreBar = function() {
  const data = window._myScore;
  const bar = document.getElementById('scoreBar');
  const ptsEl = document.getElementById('scorePts');
  const labelEl = document.getElementById('scoreLabel');
  const fillEl = document.getElementById('scoreBarFill');
  if(!bar || !data) return;

  // Show bar when on game screen
  bar.style.display = document.getElementById('game').classList.contains('active') ? 'flex' : 'none';

  const total = data.total || 0;
  const lastPts = data.lastPts || 0;
  const lastLabel = data.lastLabel || '';

  // Update pts display
  if(ptsEl) ptsEl.innerHTML = total + ' <small>pkt</small>';
  if(fillEl) {
    fillEl.style.width = Math.min(100, total / Math.max(total, 30) * 100) + '%';
    fillEl.style.background = lastPts > 1.5 ? 'linear-gradient(90deg,#39FF14,#ADFF2F)'
      : lastPts > 0 ? 'linear-gradient(90deg,#FFD700,#FFA500)'
      : 'linear-gradient(90deg,#FFD700,#FFA500)';
  }

  // Show feedback if pts changed
  if(total !== _prevTotal && total > 0) {
    const diff = total - _prevTotal;
    _prevTotal = total;

    // Label
    if(labelEl) labelEl.textContent = lastLabel || (diff > 0 ? '+' + diff + ' pkt!' : lastLabel);

    // Floating feedback
    document.querySelectorAll('.score-feedback').forEach(el=>el.remove());
    if(diff !== 0) {
      const fb = document.createElement('div');
      fb.className = 'score-feedback ' + (diff > 0 ? 'plus' : 'minus');
      fb.textContent = (diff > 0 ? '+' : '') + diff + ' pkt';
      document.body.appendChild(fb);
      setTimeout(() => fb.remove(), 3000);
    }
  } else {
    _prevTotal = total;
  }
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
